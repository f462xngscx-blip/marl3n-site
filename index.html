<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARL3N</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0a0a0a;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(to bottom,#0a0a0a,#111);
}

h1{
font-size:60px;
letter-spacing:10px;
font-weight:300;
animation:fadeIn 2s ease forwards;
opacity:0;
}

.quote{
margin-top:20px;
font-size:18px;
opacity:0;
animation:fadeIn 3s ease forwards;
animation-delay:1s;
}

.section{
padding:80px 20px;
text-align:center;
}

.section h2{
margin-bottom:20px;
letter-spacing:4px;
font-weight:300;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:40px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
filter:grayscale(100%);
transition:0.6s ease;
}

.gallery img:hover{
filter:grayscale(0%);
transform:scale(1.05);
}

footer{
padding:40px;
text-align:center;
opacity:0.5;
letter-spacing:3px;
}

audio{
display:none;
}

@keyframes fadeIn{
to{
opacity:1;
}
}
</style>
</head>

<body>

<div class="hero">
<h1>MARL3N</h1>
<div class="quote">
"He hit me and it felt like a kiss." — Lana Del Rey
</div>
</div>

<div class="section">
<h2>OBSESSIONS</h2>
<p>
Silver rings. Cigarettes after sex.  
Late night drives.  
Rät on repeat.  
my beloved girl Ray.
</p>
</div>

<div class="section">
<h2>GALLERY</h2>
<div class="gallery">
<img src="IMG_2500.jpeg">
<img src="IMG_2498.jpeg">
<img src="IMG_2497.jpeg">
<img src="IMG_2496.jpeg">
<img src="IMG_2492.jpeg">
<img src="IMG_2494.jpeg">
<img src="IMG_2491.jpeg">
<img src="IMG_2490.jpeg">
<img src="IMG_2495.jpeg">
</div>
</div>

<footer>
@MRLI1X
</footer>

<audio autoplay loop>
<source src="Lana Del Rey - High By The Beach (Clean Version).mp3" type="audio/mpeg">
</audio>

</body>
</html>
